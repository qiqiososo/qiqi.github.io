<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #C8102E;
            --primary-dark: #9B0C23;
            --primary-light: #FDE8EC;
            --gold: #B8860B;
            --gold-light: #F5E6C8;
            --text-primary: #1A1A2E;
            --text-secondary: #4A4A68;
            --text-muted: #8888A0;
            --bg: #F8F6F3;
            --card-bg: #FFFFFF;
            --border: rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --elastic-light: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== Hero ===== */
        .hero {
            position: relative;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            padding: 80px 20px 100px;
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(200,16,46,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(184,134,11,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 60px;
            background: var(--bg);
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        .hero-content {
            position: relative; z-index: 1;
            max-width: 800px; margin: 0 auto;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 16px; border-radius: 20px;
            font-size: 12px; color: rgba(255,255,255,0.85);
            margin-bottom: 24px;
            animation: badgeBounce 0.8s var(--bounce) both;
        }
        .hero-badge::before { content: '🏛️'; }
        @keyframes badgeBounce {
            from { opacity:0; transform: translateY(-20px) scale(0.5); }
            to { opacity:1; transform: translateY(0) scale(1); }
        }
        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(32px, 7vw, 56px);
            font-weight: 700; color: #FFFFFF;
            letter-spacing: 6px;
            margin-bottom: 12px;
            animation: heroElastic 1s var(--elastic) 0.1s both;
        }
        @keyframes heroElastic {
            from { opacity:0; transform: scale(0.6) translateY(30px); }
            to { opacity:1; transform: scale(1) translateY(0); }
        }
        .hero h1 span {
            display: block;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: 400; letter-spacing: 8px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
            animation: subtitleSlide 0.8s var(--elastic-light) 0.3s both;
        }
        @keyframes subtitleSlide {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }
        .hero-divider {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--gold));
            margin: 20px auto; border-radius: 1px;
            animation: dividerGrow 0.6s var(--elastic) 0.4s both;
        }
        @keyframes dividerGrow {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 1; }
        }
        .hero-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-top: 16px;
            animation: subtitleSlide 0.8s var(--elastic-light) 0.5s both;
        }

        /* ===== Floating particles ===== */
        .particles {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* ===== Notice ===== */
        .notice-bar {
            background: linear-gradient(135deg, var(--primary-light) 0%, #FFF5F5 100%);
            border: 1px solid rgba(200,16,46,0.1);
            border-radius: var(--radius-md);
            padding: 14px 20px;
            margin: -30px auto 24px;
            position: relative; z-index: 2;
            max-width: 1200px;
            display: flex; align-items: center; gap: 12px;
            animation: noticeElastic 0.6s var(--bounce) 0.6s both;
        }
        @keyframes noticeElastic {
            from { opacity:0; transform: translateY(20px) scale(0.9); }
            to { opacity:1; transform: translateY(0) scale(1); }
        }
        .notice-icon {
            width: 32px; height: 32px;
            background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; flex-shrink: 0;
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .notice-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .notice-text a {
            color: var(--primary); text-decoration: none;
            font-weight: 500; border-bottom: 1px dashed var(--primary);
            transition: all 0.3s var(--elastic);
        }
        .notice-text a:hover { border-bottom-style: solid; transform: translateX(3px); }

        /* ===== Container ===== */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

        /* ===== Section Title ===== */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding: 0 4px;
        }
        .section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px; font-weight: 600;
            color: var(--text-primary);
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px; height: 22px;
            background: linear-gradient(180deg, var(--primary), var(--gold));
            border-radius: 2px;
            animation: barGrow 0.5s var(--elastic) both;
        }
        @keyframes barGrow {
            from { height: 0; }
            to { height: 22px; }
        }
        .section-count {
            font-size: 12px; color: var(--text-muted);
            background: white; padding: 4px 12px;
            border-radius: 12px; border: 1px solid var(--border);
        }

        /* ===== Scenic Grid ===== */
        .scenic-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .scenic-item {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.5s var(--elastic);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        .scenic-item.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .scenic-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: rgba(200,16,46,0.15);
        }
        .scenic-img {
            width: 100%; height: 180px;
            overflow: hidden; position: relative;
            background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
        }
        .scenic-img img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--elastic);
        }
        .scenic-item:hover .scenic-img img {
            transform: scale(1.12);
        }
        .scenic-img .img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .scenic-item:hover .img-overlay { opacity: 1; }
        .scenic-tag {
            position: absolute; top: 12px; left: 12px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            padding: 3px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 500;
            color: var(--primary);
            border: 1px solid rgba(200,16,46,0.1);
            transition: all 0.3s var(--elastic);
        }
        .scenic-item:hover .scenic-tag { transform: scale(1.1); }
        .scenic-tag.free {
            color: #059669;
            background: rgba(236,253,245,0.92);
            border-color: rgba(5,150,105,0.1);
        }
        .scenic-body { padding: 16px 18px 18px; }
        .scenic-name {
            font-size: 17px; font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            transition: color 0.3s;
        }
        .scenic-item:hover .scenic-name { color: var(--primary); }
        .scenic-addr {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 4px;
        }
        .scenic-addr::before { content: '📍'; font-size: 11px; }
        .scenic-desc {
            color: var(--text-secondary); font-size: 13px;
            line-height: 1.6; margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .scenic-footer {
            display: flex; align-items: center; justify-content: space-between;
        }
        .scenic-price { font-size: 13px; font-weight: 500; color: var(--primary); }
        .scenic-price.free { color: #059669; }
        .expand-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 7px 16px;
            background: var(--text-primary); color: #fff;
            text-decoration: none; border-radius: 8px;
            border: none; font-size: 12px; font-weight: 500;
            cursor: pointer;
            transition: all 0.4s var(--elastic);
        }
        .expand-btn:hover {
            background: var(--primary);
            transform: translateX(2px) scale(1.08);
            box-shadow: 0 4px 12px rgba(200,16,46,0.3);
        }
        .expand-btn::after {
            content: '→';
            transition: transform 0.3s var(--elastic);
        }
        .expand-btn:hover::after { transform: translateX(4px); }
        .expand-btn.ended { background: var(--text-muted); cursor: default; }
        .expand-btn.ended:hover { background: var(--text-muted); transform: none; box-shadow: none; }

        /* ===== Modal ===== */
        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; }
        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 28px;
            width: 100%; max-width: 480px;
            max-height: 80vh; overflow-y: auto;
            transform: translateY(30px) scale(0.9);
            transition: all 0.5s var(--bounce);
            box-shadow: var(--shadow-xl);
        }
        .modal.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px; font-weight: 700;
            color: var(--text-primary); line-height: 1.3;
        }
        .modal-close-x {
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: #f5f5f5;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; color: var(--text-muted);
            transition: all 0.3s var(--elastic);
            flex-shrink: 0; margin-left: 12px;
        }
        .modal-close-x:hover { background: #eee; color: var(--text-primary); transform: rotate(90deg) scale(1.1); }
        .modal-meta {
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 20px; padding: 16px;
            background: #FAFAFA; border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        .modal-meta-item {
            display: flex; align-items: flex-start; gap: 8px;
            font-size: 14px; color: var(--text-secondary); line-height: 1.5;
        }
        .modal-meta-item .meta-icon { flex-shrink: 0; width: 20px; text-align: center; }
        .modal-intro {
            font-size: 14px; line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 24px; padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 10px 20px;
            border: none; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 14px; font-weight: 500;
            transition: all 0.3s var(--elastic);
            text-align: center; text-decoration: none;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .modal-btn-primary { background: var(--primary); color: white; }
        .modal-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 4px 12px rgba(200,16,46,0.3);
        }
        .modal-btn-secondary { background: #f5f5f5; color: var(--text-secondary); }
        .modal-btn-secondary:hover { background: #eee; transform: scale(1.03); }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 30px 20px 40px;
            color: var(--text-muted);
            font-size: 12px; line-height: 1.8;
        }
        .footer-divider { width: 40px; height: 1px; background: var(--border); margin: 0 auto 16px; }
        .footer a { color: var(--text-secondary); text-decoration: none; border-bottom: 1px dashed var(--text-muted); }

        /* ===== Quick Nav Pills ===== */
        .quick-nav {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 16px; margin-bottom: 24px;
            max-width: 1200px; margin-left: auto; margin-right: auto;
        }
        .quick-pill {
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; color: var(--text-secondary);
            background: white; border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.4s var(--elastic);
            white-space: nowrap;
        }
        .quick-pill:hover {
            background: var(--primary); color: #fff;
            border-color: var(--primary);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 4px 12px rgba(200,16,46,0.2);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .hero { padding: 50px 16px 70px; }
            .scenic-list { grid-template-columns: 1fr; gap: 16px; }
            .notice-bar { margin: -24px 12px 20px; padding: 12px 16px; }
            .modal-content { padding: 20px; border-radius: var(--radius-lg); }
            .modal-actions { flex-direction: column; }
            .quick-nav { padding: 12px; }
        }
        @media (min-width: 768px) {
            .container { padding: 0 24px; }
            .scenic-img { height: 200px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

        .img-placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f5f5f5, #ebebeb);
            color: var(--text-muted); font-size: 32px;
        }
        .scenic-img img[data-src] { opacity: 0; transition: opacity 0.4s; }
        .scenic-img img.loaded { opacity: 1; }
    </style>
</head>

        // Render cards
        function renderScenicList() {
            const container = document.getElementById('scenicList');
            container.innerHTML = scenicData.map((item, i) => `
                <div class="scenic-item" data-index="${i}">
                    <div class="scenic-img">
                        <div class="img-placeholder">🏔️</div>
                        <img data-src="${item.img}" alt="${item.name}">
                        <div class="img-overlay"></div>
                        <span class="scenic-tag ${item.tagType}">${item.tag}</span>
                    </div>
                    <div class="scenic-body">
                        <h3 class="scenic-name">${item.name}</h3>
                        <div class="scenic-addr">${item.addr}</div>
                        <p class="scenic-desc">${item.desc}</p>
                        <div class="scenic-footer">
                            <span class="scenic-price ${item.priceType}">${item.price}</span>
                            <button class="expand-btn ${item.ended ? 'ended' : ''}"
                                onclick="${item.ended ? '' : `openModal(${i})`}">
                                ${item.ended ? '已结束' : '展开详情'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lazyLoadImages();
            observeCards();
        }

        // Quick nav pills
        function renderQuickNav() {
            const nav = document.getElementById('quickNav');
            nav.innerHTML = scenicData.map(item =>
                `<a href="${item.link}" class="quick-pill" target="_blank">${item.name}</a>`
            ).join('');
        }

        // Lazy load
        function lazyLoadImages() {
            const images = document.querySelectorAll('img[data-src]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.onload = () => {
                            img.classList.add('loaded');
                            const p = img.parentElement.querySelector('.img-placeholder');
                            if (p) p.style.display = 'none';
                        };
                        img.onerror = () => { img.style.display = 'none'; };
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: '100px' });
            images.forEach(img => observer.observe(img));
        }

        // Scroll reveal for cards
        function observeCards() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => entry.target.classList.add('visible'), i * 60);
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.scenic-item').forEach(el => obs.observe(el));
        }

        // Modal
        function openModal(index) {
            const item = scenicData[index];
            if (!item) return;
            document.getElementById('modalName').textContent = item.name;
            document.getElementById('modalAddr').textContent = item.fullAddr;
            document.getElementById('modalPrice').textContent = item.fullPrice;
            document.getElementById('modalIntro').textContent = item.intro;
            const btn = document.getElementById('modalDetailBtn');
            if (item.link && item.link.startsWith('http')) {
                btn.href = item.link;
                btn.textContent = '查看详情';
            } else {
                btn.href = 'javascript:void(0)';
                btn.textContent = '链接暂不可用';
            }
            const modal = document.getElementById('detailModal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; document.body.style.overflow = ''; }, 400);
        }
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
                container.appendChild(p);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderScenicList();
            renderQuickNav();
            createParticles();
        });
    </script>
